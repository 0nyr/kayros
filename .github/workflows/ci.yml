name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  no-cplex-gate:
    # The default kayros build must never reference CPLEX headers. The
    # vendored Lera CPLEX backend (cpp/lera/goc/*/linear_programming/cplex/)
    # is the sanctioned exception: CMake compiles it only under the opt-in
    # -DLERA_LP_BACKEND=cplex, never in the default (HiGHS) build.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Grep gate — no ilcplex/ilconcert outside the opt-in cplex backend
        run: |
          ! grep -rn --include='*.h' --include='*.hpp' --include='*.cpp' --exclude-dir=cplex -e 'ilcplex' -e 'ilconcert' cpp/ src/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Upgrade pip (dependency-groups support needs >= 25.1)
        run: python -m pip install --upgrade pip
      - name: Install Boost.Graph (lera BPC dependency; HiGHS is fetched by CMake)
        run: sudo apt-get update && sudo apt-get install -y libboost-graph-dev
      - name: Install (editable + dev group)
        run: pip install -e . --group dev
      - name: Lera BPC import gate (default install ships the exact component)
        run: python -c "import kayros._lera; from kayros import lera; print('lera OK')"
      - name: Fetch Dabia2013 n=25 benchmarks (sparse)
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/ANR-MAMUT/MAMUT-routing.git "$RUNNER_TEMP/mamut-routing"
          git -C "$RUNNER_TEMP/mamut-routing" sparse-checkout set \
            benchmarks/TDVRPTW/Dabia2013/n=25 benchmarks/TDVRP/Dabia2013/n=25
      - name: Run tests (incl. checker-equivalence gate on Dabia n=25)
        env:
          MAMUT_ROUTING_ROOT: ${{ runner.temp }}/mamut-routing
        run: pytest
