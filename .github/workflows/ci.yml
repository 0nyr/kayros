name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  no-cplex-gate:
    # The default kayros build must never reference CPLEX headers.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Grep gate — no ilcplex/ilconcert in default sources
        run: |
          ! grep -rn --include='*.h' --include='*.hpp' --include='*.cpp' -e 'ilcplex' -e 'ilconcert' cpp/ src/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Upgrade pip (dependency-groups support needs >= 25.1)
        run: python -m pip install --upgrade pip
      - name: Install (editable + dev group)
        run: pip install -e . --group dev
      - name: Run tests
        run: pytest
